version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ta-postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ta_platform
      POSTGRES_USER: ta_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ta_platform}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ta_admin -d ta_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ta-redis
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    restart: always

  backend:
    build: ./backend
    container_name: ta-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://ta_admin:${DB_PASSWORD:-ta_platform}@postgres:5432/ta_platform
      REDIS_URL: redis://redis:6379
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_API_BASE: ${DEEPSEEK_API_BASE:-https://api.deepseek.com}
      DEEPSEEK_MODEL_NAME: ${DEEPSEEK_MODEL_NAME:-deepseek-chat}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRE_MINUTES: ${JWT_ACCESS_EXPIRE_MINUTES:-30}
      JWT_REFRESH_EXPIRE_DAYS: ${JWT_REFRESH_EXPIRE_DAYS:-7}
      ALIBABA_SMS_ACCESS_KEY: ${ALIBABA_SMS_ACCESS_KEY:-}
      ALIBABA_SMS_SECRET: ${ALIBABA_SMS_SECRET:-}
      ALIBABA_SMS_SIGN_NAME: ${ALIBABA_SMS_SIGN_NAME:-}
      ALIBABA_SMS_TEMPLATE_CODE: ${ALIBABA_SMS_TEMPLATE_CODE:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    volumes:
      - uploads:/app/uploads
      - ./backend/app/knowledge_base:/app/app/knowledge_base

  nginx:
    image: nginx:alpine
    container_name: ta-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/public/static:/usr/share/nginx/html/static:ro
      - ./certbot/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:
  redisdata:
  uploads:
